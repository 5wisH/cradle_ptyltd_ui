# Render Blueprint — Cradle portfolio (static site)
# Deploy: push this repo to GitHub, then in Render choose
# "New +" -> "Blueprint" and point it at this repo.
services:
  - type: web
    name: cradle-portfolio
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist/cradle-portfolio/browser
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
    routes:
      # Single-page app: send every path to index.html
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
