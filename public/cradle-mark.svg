<svg width="160" height="200" viewBox="0 0 160 200" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Cradle mark — a figure facing the rising sun</title>

<!-- Background (matches the site navigation panel) -->
<rect x="0" y="0" width="160" height="200" fill="#0a0a1a"/>

<!-- Rising sun -->
<g fill="none" stroke="#e94560" stroke-width="3.5" stroke-linecap="round">
  <line x1="104.0" y1="42.0" x2="114.0" y2="42.0"/>
  <line x1="100.8" y1="54.0" x2="109.4" y2="59.0"/>
  <line x1="92.0" y1="62.8" x2="97.0" y2="71.4"/>
  <line x1="80.0" y1="66.0" x2="80.0" y2="76.0"/>
  <line x1="68.0" y1="62.8" x2="63.0" y2="71.4"/>
  <line x1="59.2" y1="54.0" x2="50.6" y2="59.0"/>
  <line x1="56.0" y1="42.0" x2="46.0" y2="42.0"/>
  <line x1="59.2" y1="30.0" x2="50.6" y2="25.0"/>
  <line x1="68.0" y1="21.2" x2="63.0" y2="12.6"/>
  <line x1="80.0" y1="18.0" x2="80.0" y2="8.0"/>
  <line x1="92.0" y1="21.2" x2="97.0" y2="12.6"/>
  <line x1="100.8" y1="30.0" x2="109.4" y2="25.0"/>
</g>
<circle cx="80" cy="42" r="18" fill="#e94560"/>

<!-- Ground (curved horizon) -->
<path d="M26,170 Q80,158 134,170" fill="none" stroke="#e94560" stroke-width="3" stroke-linecap="round"/>

<!-- Figure, back to us, facing the sun -->
<g fill="#ffffff" stroke="#ffffff" stroke-linecap="round">
  <circle cx="80" cy="98" r="10" stroke="none"/>
  <path d="M65,111 Q80,106 95,111 L91,134 L69,134 Z" stroke="none"/>
  <line x1="67" y1="112" x2="62" y2="135" stroke-width="5"/>
  <line x1="93" y1="112" x2="98" y2="135" stroke-width="5"/>
  <line x1="74" y1="134" x2="70" y2="164" stroke-width="6.5"/>
  <line x1="86" y1="134" x2="90" y2="163" stroke-width="6.5"/>
</g>
</svg>
